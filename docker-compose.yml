# DamgaPanel — yerel geliştirme servisleri.
# Kullanım:  docker compose up -d   (Postgres + Redis ayağa kalkar)
services:
  postgres:
    image: postgres:16-alpine
    container_name: damga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: damga
      POSTGRES_PASSWORD: damga
      POSTGRES_DB: damgapanel
    ports:
      - "5432:5432"
    volumes:
      - damga-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: damga-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - damga-redis-data:/data

volumes:
  damga-postgres-data:
  damga-redis-data:
